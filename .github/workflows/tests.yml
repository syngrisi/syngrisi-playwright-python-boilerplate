name: Playwright Python Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:8
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium
      - name: Start Syngrisi server
        run: npx -y @syngrisi/syngrisi@latest start -d
        env:
          SYNGRISI_AUTH: 'false'
          SYNGRISI_DB_URI: 'mongodb://127.0.0.1:27017/SyngrisiDb'
      - name: Wait for Syngrisi server
        run: npx -y wait-on http://localhost:3000 --timeout 60000
      - name: Run tests
        run: pytest -q
      - name: Stop Syngrisi server
        if: always()
        run: npx -y @syngrisi/syngrisi@latest stop
