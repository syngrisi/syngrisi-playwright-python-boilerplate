name: Playwright Python Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:8
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium
      # Start the Syngrisi server (the `sy` bin = the server) in the background and wait for it.
      - name: Start Syngrisi server
        run: |
          nohup npx -y @syngrisi/syngrisi@latest > /tmp/syngrisi.log 2>&1 &
          npx -y wait-on http://localhost:3000/v1/app/info --timeout 120000
        env:
          SYNGRISI_AUTH: 'false'
          SYNGRISI_DB_URI: 'mongodb://127.0.0.1:27017/SyngrisiDb'
      - name: Run tests
        run: pytest -q
      - name: Stop Syngrisi server
        if: always()
        run: pkill -f 'server/server.js' || true
      - name: Syngrisi server log
        if: failure()
        run: cat /tmp/syngrisi.log || true
